<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Shoxjahon | Premium Dental Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-blue: #0071e3;
            --apple-blue-light: #e3f2fd;
            --apple-glass: rgba(255, 255, 255, 0.85);
            --apple-text: #1d1d1f;
            --apple-text-gray: #86868b;
            --card-radius: 22px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            padding-bottom: 100px;
        }

        .icon {
            width: 22px;
            height: 22px;
            fill: currentColor;
            display: inline-block;
            vertical-align: middle;
        }

        header {
            position: sticky;
            top: 0;
            background: var(--apple-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 100;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo-area h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #0071e3, #00b4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-trigger {
            background: none;
            border: none;
            color: var(--apple-text-gray);
            cursor: pointer;
            padding: 6px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
        }

        .page {
            display: none;
            animation: fadeIn 0.2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .page.active {
            display: block;
        }

        .hero-banner {
            background: white;
            border-radius: var(--card-radius);
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
            margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .hero-banner h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .hero-banner p { color: var(--apple-text-gray); font-size: 14px; line-height: 1.4; }

        .bio-box {
            font-size: 13px;
            color: #424245;
            background: var(--apple-blue-light);
            padding: 12px;
            border-radius: 12px;
            margin-top: 14px;
            text-align: left;
            border-left: 4px solid var(--apple-blue);
        }

        .apple-card-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 18px;
            border-radius: var(--card-radius);
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.01);
            width: 100%;
        }

        .btn-main-info { display: flex; align-items: center; gap: 14px; }
        .btn-circle-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ic-blue { background: #e3f2fd; color: #0071e3; }
        .ic-purple { background: #f3e5f5; color: #af52de; }
        .ic-orange { background: #fff3e0; color: #ff9500; }

        .btn-txt-title { font-size: 15px; font-weight: 600; text-align: left; }
        .btn-txt-desc { font-size: 12px; color: var(--apple-text-gray); text-align: left; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }

        .apple-input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #d2d2d7;
            background: white;
            font-size: 15px;
            outline: none;
        }

        .submit-btn {
            background: var(--apple-blue);
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 24px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--apple-blue);
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            cursor: pointer;
        }

        .info-card {
            background: white;
            border-radius: var(--card-radius);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(0,0,0,0.01);
        }

        .info-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            font-size: 14px;
        }
        .info-row:last-child { border: none; }
        .info-label { color: var(--apple-text-gray); }
        .info-value { font-weight: 600; }

        .doctor-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .doctor-row:last-child { border-bottom: none; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--apple-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--apple-text-gray);
            background: none;
            border: none;
            font-size: 11px;
            gap: 4px;
            cursor: pointer;
        }

        .nav-item.active { color: var(--apple-blue); font-weight: 600; }
    </style>
</head>
<body>

    <svg style="display: none;">
        <g id="icon-tooth"><path d="M12 2C9.5 2 7.5 3.5 7 6c-.5 2.5-2 4.5-2 7 0 3.5 2 6 4.5 6 1.5 0 2-1 2.5-1s1 1 2.5 1c2.5 0 4.5-2.5 4.5-6 0-2.5-1.5-4.5-2-7-.5-2.5-2.5-4-5-4zm-2 5c-.6 0-1-.4-1-1s.4-1 1-1 1 .4 1 1-.4 1-1 1z"/></g>
        <g id="icon-gear"><path d="M19.4 13c0-.3.1-.6.1-.9s0-.6-.1-.9l2.1-1.7c.2-.2.2-.4.1-.6l-2-3.5c-.1-.2-.4-.3-.6-.2l-2.5 1c-.5-.4-1.1-.7-1.7-1l-.4-2.6c0-.2-.2-.4-.5-.4h-4c-.3 0-.5.2-.5.4l-.4 2.6c-.6.3-1.2.6-1.7 1l-2.5-1c-.2-.1-.5 0-.6.2l-2 3.5c-.1.2-.1.4.1.6l2.1 1.7c0 .3-.1.6-.1.9s0 .6.1.9l-2.1 1.7c-.2.2-.2.4-.1.6l2 3.5c.1.2.4.3.6.2l2.5-1c.5.4 1.1.7 1.7 1l.4 2.6c0 .2.2.4.5.4h4c.3 0 .5-.2.5-.4l.4-2.6c.6-.3 1.2-.6 1.7-1l2.5 1c.2.1.5 0 .6-.2l2-3.5c.1-.2.1-.4-.1-.6l-2.1-1.7zm-7.4 2.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5z"/></g>
        <g id="icon-home"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></g>
        <g id="icon-calendar"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></g>
        <g id="icon-address"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></g>
        <g id="icon-chevron"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></g>
    </svg>

    <header>
        <div class="logo-area" onclick="switchPage('home')">
            <svg class="icon" style="color:var(--apple-blue);"><use href="#icon-tooth"/></svg>
            <h1 id="siteTitleDisplay">Yuklanmoqda...</h1>
        </div>
        <button class="admin-trigger" onclick="checkAdmin()">
            <svg class="icon"><use href="#icon-gear"/></svg>
        </button>
    </header>

    <div class="container">

        <!-- BOSH SAHIFA -->
        <div id="home" class="page active">
            <div class="hero-banner">
                <h2 id="mainHeadingDisplay">Mukammal Tabassum</h2>
                <p id="mainDescDisplay">Premium xizmat ko'rsatish markazi</p>
                <div class="bio-box" id="bioDisplay">Yuklanmoqda...</div>
            </div>

            <button class="apple-card-btn" onclick="switchPage('booking')">
                <div class="btn-main-info">
                    <div class="btn-circle-icon ic-blue"><svg class="icon"><use href="#icon-calendar"/></svg></div>
                    <div>
                        <div class="btn-txt-title">Onlayn Navbat</div>
                        <div class="btn-txt-desc">Sana va vaqtni tanlab joy band qilish</div>
                    </div>
                </div>
                <svg class="icon" style="color:#c7c7cc; width:16px;"><use href="#icon-chevron"/></svg>
            </button>

            <button class="apple-card-btn" onclick="switchPage('services')">
                <div class="btn-main-info">
                    <div class="btn-circle-icon ic-purple"><svg class="icon"><use href="#icon-tooth"/></svg></div>
                    <div>
                        <div class="btn-txt-title">Xizmatlar va Narxlar</div>
                        <div class="btn-txt-desc">Muolajalar turi va narxlari ro'yxati</div>
                    </div>
                </div>
                <svg class="icon" style="color:#c7c7cc; width:16px;"><use href="#icon-chevron"/></svg>
            </button>

            <button class="apple-card-btn" onclick="switchPage('contacts')">
                <div class="btn-main-info">
                    <div class="btn-circle-icon ic-orange"><svg class="icon"><use href="#icon-address"/></svg></div>
                    <div>
                        <div class="btn-txt-title">Klinika va Shifokorlar</div>
                        <div class="btn-txt-desc">Mutaxassislarimiz va aloqa</div>
                    </div>
                </div>
                <svg class="icon" style="color:#c7c7cc; width:16px;"><use href="#icon-chevron"/></svg>
            </button>
        </div>

        <!-- NAVBATGA YOZILISH SAHIFASI -->
        <div id="booking" class="page">
            <button class="back-btn" onclick="switchPage('home')">← Orqaga</button>
            <form id="appointmentForm" onsubmit="sendData(event)">
                <div class="form-group"><label>Ism va Familiyangiz</label><input type="text" id="userName" class="apple-input" required></div>
                <div class="form-group"><label>Telefon raqamingiz</label><input type="tel" id="userPhone" class="apple-input" value="+998 " required></div>
                <div class="form-group"><label>Yashash manzilingiz</label><input type="text" id="userAddress" class="apple-input" required></div>
                <div class="form-group"><label>Xizmat turi</label><select id="serviceTypeSelect"></select></div>
                <div class="form-group">
                    <label>Sana va Vaqt</label>
                    <div style="display:flex; gap:10px;"><input type="date" id="bookDate" class="apple-input" required><input type="time" id="bookTime" class="apple-input" required></div>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Navbatni Tasdiqlash</button>
            </form>
        </div>

        <!-- XIZMATLAR SAHIFASI -->
        <div id="services" class="page">
            <button class="back-btn" onclick="switchPage('home')">← Orqaga</button>
            <div class="info-card" id="servicesListDisplay"></div>
        </div>

        <!-- KONTAKTLAR -->
        <div id="contacts" class="page">
            <button class="back-btn" onclick="switchPage('home')">← Orqaga</button>
            <div class="info-card"><div class="info-title">👨‍⚕️ Shifokorlar</div><div id="doctorsListDisplay"></div></div>
            <div class="info-card">
                <div class="info-title">✨ Ma'lumotlar</div>
                <div class="info-row"><span class="info-label">Ish vaqti:</span><span class="info-value" id="workTimeDisplay">-</span></div>
                <div class="info-row"><span class="info-label">Telefon:</span><span class="info-value" id="clinicPhoneDisplay">-</span></div>
            </div>
        </div>

        <!-- ADMIN PANEL -->
        <div id="adminPanel" class="page">
            <button class="back-btn" onclick="switchPage('home')">← Chiqish</button>
            <h3 style="margin-bottom:12px;">⚙️ Tahrirlash Paneli</h3>
            
            <div class="form-group"><label>Sayt nomi</label><input type="text" id="editSiteTitle" class="apple-input"></div>
            <div class="form-group"><label>Asosiy sarlavha</label><input type="text" id="editMainHeading" class="apple-input"></div>
            <div class="form-group"><label>Kichik tavsif</label><input type="text" id="editMainDesc" class="apple-input"></div>
            <div class="form-group"><label>Klinika haqida</label><textarea id="editBio" rows="3"></textarea></div>
            <div class="form-group"><label>Ish vaqti</label><input type="text" id="editWorkTime" class="apple-input"></div>
            <div class="form-group"><label>Klinika telefoni</label><input type="text" id="editClinicPhone" class="apple-input"></div>
            <div class="form-group"><label>Shifokorlar (Ism = Kasbi)</label><textarea id="editDoctors" rows="3" placeholder="Dr. Ali = Xirurg"></textarea></div>
            <div class="form-group"><label>Xizmatlar (Nomi = Narxi)</label><textarea id="editServices" rows="3" placeholder="Plomba = 100 000"></textarea></div>
            
            <button class="submit-btn" onclick="saveAdminSettings()" id="saveBtn">O'zgarishlarni Saqlash</button>
        </div>

    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchPage('home')">Asosiy</button>
        <button class="nav-item" onclick="switchPage('booking')">Navbat</button>
        <button class="nav-item" onclick="switchPage('services')">Xizmatlar</button>
        <button class="nav-item" onclick="switchPage('contacts')">Klinika</button>
    </div>

    <script>
        const BOT_TOKEN = '8615273402:AAH1BAeAbQ18c2AW54qBr6IzyeZnQM2KfTc'; 
        const KANAL_NAME = 'dental_clinic_sh'; 
        const GURUX_USERNAME = 'dental_shoox';

        // Boshlang'ich default ma'lumotlar
        let settings = {
            siteTitle: "Dr. Shoxjahon",
            mainHeading: "Mukammal Tabassum",
            mainDesc: "Premium darajadagi zamonaviy stomatologiya xizmati.",
            bio: "Klinikamiz ko'p yillik tajribaga ega shifokorlar bilan tishlaringiz salomatligini ishonchli himoya qiladi.",
            workTime: "7:00 - 19:00",
            clinicPhone: "+998919677750",
            doctorsText: "Dr. Shoxjahon Latifova = Bosh Shifokor\nDr. Azizov Bexruz = Xirurg",
            servicesText: "Konsultatsiya = Bepul\nTish davolash = 150 000 so'm"
        };

        // KANALDAGI ENGOXIRGI XABARNI O'QISH (XATOSIZ USUL)
        function loadSettings() {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1&limit=1`)
                .then(res => res.json())
                .then(data => {
                    if(data.ok && data.result.length > 0) {
                        const lastMessage = data.result[0].channel_post;
                        if(lastMessage && lastMessage.chat.username === KANAL_NAME && lastMessage.text) {
                            try {
                                settings = JSON.parse(lastMessage.text);
                            } catch(e) { console.log("Kanaldagi post JSON formatda emas"); }
                        }
                    }
                    updateDOM();
                }).catch(() => updateDOM());
        }

        function updateDOM() {
            document.getElementById('siteTitleDisplay').innerText = settings.siteTitle;
            document.getElementById('mainHeadingDisplay').innerText = settings.mainHeading;
            document.getElementById('mainDescDisplay').innerText = settings.mainDesc;
            document.getElementById('bioDisplay').innerText = settings.bio;
            document.getElementById('workTimeDisplay').innerText = settings.workTime;
            document.getElementById('clinicPhoneDisplay').innerText = settings.clinicPhone;

            const listDisplay = document.getElementById('servicesListDisplay');
            const selectElement = document.getElementById('serviceTypeSelect');
            listDisplay.innerHTML = ''; selectElement.innerHTML = '';

            settings.servicesText.split('\n').forEach(line => {
                if(line.includes('=')) {
                    const [name, price] = line.split('=');
                    listDisplay.innerHTML += `<div class="info-row"><span class="info-label">${name.trim()}</span><span class="info-value">${price.trim()}</span></div>`;
                    selectElement.innerHTML += `<option>${name.trim()}</option>`;
                }
            });

            const docsDisplay = document.getElementById('doctorsListDisplay');
            docsDisplay.innerHTML = '';
            settings.doctorsText.split('\n').forEach(line => {
                if(line.includes('=')) {
                    const [docName, docSpec] = line.split('=');
                    docsDisplay.innerHTML += `<div class="doctor-row"><div><div style="font-weight:600;">${docName.trim()}</div><div style="color:var(--apple-text-gray); font-size:13px;">${docSpec.trim()}</div></div></div>`;
                }
            });
        }

        function checkAdmin() {
            if (prompt('Admin parolini kiriting:') === '123') {
                document.getElementById('editSiteTitle').value = settings.siteTitle;
                document.getElementById('editMainHeading').value = settings.mainHeading;
                document.getElementById('editMainDesc').value = settings.mainDesc;
                document.getElementById('editBio').value = settings.bio;
                document.getElementById('editWorkTime').value = settings.workTime;
                document.getElementById('editClinicPhone').value = settings.clinicPhone;
                document.getElementById('editDoctors').value = settings.doctorsText;
                document.getElementById('editServices').value = settings.servicesText;
                switchPage('adminPanel');
            } else { alert('Parol noto\'g\'ri!'); }
        }

        function saveAdminSettings() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saqlanmoqda...";

            settings = {
                siteTitle: document.getElementById('editSiteTitle').value,
                mainHeading: document.getElementById('editMainHeading').value,
                mainDesc: document.getElementById('editMainDesc').value,
                bio: document.getElementById('editBio').value,
                workTime: document.getElementById('editWorkTime').value,
                clinicPhone: document.getElementById('editClinicPhone').value,
                doctorsText: document.getElementById('editDoctors').value,
                servicesText: document.getElementById('editServices').value
            };

            // KANALGA TO'G'RIDAN-TO'G'RI POST QILIB YUBORISH
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: `@${KANAL_NAME}`, text: JSON.stringify(settings) })
            }).then(() => {
                alert("✅ O'zgarishlar muvaffaqiyatli saqlandi!");
                btn.innerText = "O'zgarishlarni Saqlash";
                updateDOM();
                switchPage('home');
            });
        }

        function sendData(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Yuborilmoqda...";

            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const address = document.getElementById('userAddress').value;
            const service = document.getElementById('serviceTypeSelect').value;
            const date = document.getElementById('bookDate').value;
            const time = document.getElementById('bookTime').value;

            const xabar = `<b>🔔 YANGI NAVBAT KELDI!</b>\n\n👤 <b>Bemor:</b> ${name}\n📞 <b>Tel:</b> ${phone}\n📍 <b>Manzil:</b> ${address}\n🦷 <b>Xizmat:</b> ${service}\n📅 <b>Sana:</b> ${date} | ⏰ <b>Vaqt:</b> ${time}`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: `@${GURUX_USERNAME}`, text: xabar, parse_mode: "HTML" })
            }).then(() => {
                alert('✅ Navbatingiz muvaffaqiyatli qabul qilindi!');
                document.getElementById('appointmentForm').reset();
                document.getElementById('userPhone').value = '+998 ';
                btn.innerText = "Navbatni Tasdiqlash";
                switchPage('home');
            });
        }

        function switchPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Aktiv menyuni belgilash
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const index = ['home', 'booking', 'services', 'contacts'].indexOf(id);
            if(index !== -1) document.querySelectorAll('.nav-item')[index].classList.add('active');
        }

        document.getElementById('userPhone').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,2})(\d{0,3})(\d{0,2})(\d{0,2})/);
            if (!x[1]) { e.target.value = '+998 '; return; }
            e.target.value = '+998 ' + (x[2] ? '(' + x[2] + ') ' : '') + x[3] + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
        });

        window.onload = loadSettings;
    </script>
</body>
</html>
